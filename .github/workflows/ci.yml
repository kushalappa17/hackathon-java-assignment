name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: quarkus_test
          POSTGRES_USER: kushalappa_np
          POSTGRES_PASSWORD: Kushalappa@17
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Run unit tests
        run: mvn clean test -B

      - name: Package application
        run: mvn package -B -DskipTests

      - name: Run integration tests
        run: mvn failsafe:integration-test failsafe:verify -B -DCI_SKIP_INTEGRATION=true

      - name: Generate coverage report
        run: mvn jacoco:merge@merge-results jacoco:report@report -B

      - name: Print coverage summary
        run: |
          echo "====== 📊 JaCoCo Coverage Summary ======"
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse('target/site/jacoco/jacoco.xml')
          root = tree.getroot()
          counters = {c.get('type'): c for c in root.findall('counter')}
          def pct(c):
              missed = int(c.get('missed', 0))
              covered = int(c.get('covered', 0))
              total = missed + covered
              return f"{covered}/{total} ({100*covered//total if total else 0}%)" if total else "N/A"
          for t in ['INSTRUCTION', 'BRANCH', 'LINE', 'METHOD', 'CLASS']:
              if t in counters:
                  print(f"  {t:<12} {pct(counters[t])}")
          PYEOF

      - name: Post coverage comment to PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: '📊 JaCoCo Coverage Report'
          update-comment: true
          min-coverage-overall: 60
          min-coverage-changed-files: 70
          pass-emoji: '✅'
          fail-emoji: '❌'

      - name: Print surefire reports on failure
        if: failure()
        run: |
          echo "=== SUREFIRE REPORTS ==="
          find target/surefire-reports -name "*.txt" -exec cat {} \; 2>/dev/null
          echo "=== DUMP FILES ==="
          find target/surefire-reports -name "*.dumpstream" -exec cat {} \; 2>/dev/null

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/
          retention-days: 7

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Build deployable JAR (skip tests — already passed)
        run: mvn package -B -DskipTests

      - name: Upload deployable artifact
        uses: actions/upload-artifact@v4
        with:
          name: quarkus-app
          path: target/quarkus-app/
          retention-days: 30

      - name: Deployment complete
        run: echo "Artifact built and ready for deployment from main branch."